{% extends "base.html" %}
{% block title %}Anwendungen{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-semibold">Anwendungen</h1>
    <a href="{% url 'ipam:application_new' %}"
       class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-medium">
        + Anwendung
    </a>
</div>
<table class="w-full bg-white rounded shadow text-sm">
    <thead class="bg-slate-100">
        <tr><th class="text-left p-2">Name</th><th class="text-left p-2">Zuweisungen</th></tr>
    </thead>
    <tbody>
    {% for a in applications %}
        <tr class="border-t">
            <td class="p-2"><a href="{% url 'ipam:application_detail' a.id %}" class="underline">{{ a.name }}</a></td>
            <td class="p-2">{{ a.n_assignments }}</td>
        </tr>
    {% empty %}
        <tr><td colspan="2" class="p-4 text-center text-slate-500">Noch keine Anwendungen.</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
