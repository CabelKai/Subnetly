{% for pool in sidebar_pools %}
    <details class="mb-2" open>
        <summary class="cursor-pointer">
            <a href="{% url 'ipam:pool_detail' pool.id %}" class="font-mono hover:underline">{{ pool.cidr }}</a>
        </summary>
        <div class="pl-3 mt-1">
            {% for c in pool.applications %}
                <details class="mb-1">
                    <summary class="cursor-pointer">
                        <a href="{% url 'ipam:application_detail' c.id %}" class="hover:underline">{{ c.name }}</a>
                    </summary>
                    <ul class="pl-4 mt-1 text-xs font-mono text-slate-600">
                        {% for a in c.assignments %}
                            <li><a href="{% url 'ipam:pool_detail' a.pool_id %}#a{{ a.id }}" class="hover:underline">{{ a.cidr }}</a></li>
                        {% endfor %}
                    </ul>
                </details>
            {% endfor %}
        </div>
    </details>
{% empty %}
    <p class="text-slate-500 italic">Noch keine Pools angelegt.</p>
{% endfor %}
